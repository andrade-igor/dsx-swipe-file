<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSX — Swipe File de Anúncios</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #E8A020;
    --gold-light: #F5C048;
    --black: #0A0A0A;
    --dark: #111111;
    --card: #161616;
    --border: rgba(232,160,32,0.2);
    --text: #F0EEE8;
    --muted: rgba(240,238,232,0.5);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 64px 40px 48px;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .header-left { flex: 1; min-width: 260px; }

  .logo-img {
    height: 44px;
    width: auto;
    margin-bottom: 20px;
    display: block;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 0.95;
    letter-spacing: 1px;
    color: var(--text);
  }

  header h1 span { color: var(--gold); }

  header p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
    max-width: 380px;
    line-height: 1.6;
  }

  .header-tag {
    background: var(--gold);
    color: var(--black);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    align-self: flex-start;
    white-space: nowrap;
  }

  /* LEGEND */
  .legend {
    position: relative;
    z-index: 10;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* GRID */
  .grid {
    position: relative;
    z-index: 10;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease;
    cursor: pointer;
    position: relative;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
    z-index: 2;
  }

  .card-number {
    position: absolute;
    top: 12px;
    left: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    background: rgba(10,10,10,0.85);
    padding: 3px 8px;
    z-index: 3;
    backdrop-filter: blur(4px);
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 9/16;
    overflow: hidden;
    background: #0d0d0d;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover .card-img-wrap img {
    transform: scale(1.03);
  }

  /* OVERLAY on hover */
  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    padding: 20px;
  }

  .card:hover .card-overlay { opacity: 1; }

  .overlay-angle {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* CARD BODY */
  .card-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 2px;
  }

  .tag-angle { background: rgba(232,160,32,0.15); color: var(--gold); border: 1px solid rgba(232,160,32,0.3); }
  .tag-hook { background: rgba(255,80,80,0.1); color: #FF7070; border: 1px solid rgba(255,80,80,0.3); }
  .tag-prova { background: rgba(80,180,255,0.1); color: #70CFFF; border: 1px solid rgba(80,180,255,0.3); }
  .tag-cta { background: rgba(120,220,120,0.1); color: #80E080; border: 1px solid rgba(120,220,120,0.3); }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1.1;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .copy-block {
    background: rgba(255,255,255,0.04);
    border-left: 2px solid var(--gold);
    padding: 10px 12px;
    border-radius: 0 4px 4px 0;
  }

  .copy-block p {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(240,238,232,0.85);
    font-style: italic;
  }

  .why-block {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 14px;
  }

  .why-block p {
    font-size: 13px;
    line-height: 1.65;
    color: var(--muted);
  }

  .why-block strong {
    color: var(--text);
    font-weight: 600;
  }

  .replicate-box {
    background: rgba(232,160,32,0.06);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 4px;
    padding: 12px;
  }

  .replicate-box .section-label { color: var(--gold); margin-bottom: 6px; }

  .replicate-box p {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(240,238,232,0.75);
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 10;
    border-top: 1px solid var(--border);
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer p { font-size: 12px; color: var(--muted); }
  footer span { color: var(--gold); font-weight: 600; }

  /* ANIMATIONS */
  .card {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.5s forwards;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }
  .card:nth-child(7) { animation-delay: 0.35s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  header {
    opacity: 0;
    animation: fadeUp 0.6s 0s forwards;
  }

  /* MODAL */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(8px);
  }

  .modal-bg.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    max-width: 760px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    gap: 0;
    transform: scale(0.96);
    transition: transform 0.25s;
    border-radius: 2px;
  }

  .modal-bg.open .modal { transform: scale(1); }

  .modal-img {
    width: 200px;
    flex-shrink: 0;
    object-fit: cover;
    display: block;
  }

  .modal-content {
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal { position: relative; }

  @media (max-width: 600px) {
    header, .legend, .grid, footer { padding-left: 20px; padding-right: 20px; }
    .modal { flex-direction: column; }
    .modal-img { width: 100%; height: 220px; }
    header { padding-top: 40px; }
  }
</style>
</head>

const grid = document.getElementById('grid');
const tagColors = { "tag-angle": "#E8A020", "tag-hook": "#FF7070", "tag-prova": "#70CFFF", "tag-cta": "#80E080" };

ads.forEach((ad, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-number">0${i+1}</div>
    <div class="card-img-wrap">
      <img src="${ad.img}" alt="Anúncio ${i+1}" loading="lazy">
      <div class="card-overlay"><div class="overlay-angle">${ad.angle}</div></div>
    </div>
    <div class="card-body">
      <div class="tag-row">
        ${ad.tags.map((t,j) => `<span class="tag ${t}">${ad.tagLabels[j]}</span>`).join('')}
      </div>
      <div class="card-title">${ad.title}</div>
      <div>
        <div class="section-label">Copy Principal</div>
        <div class="copy-block"><p>${ad.copy}</p></div>
      </div>
      <div class="why-block">
        <div class="section-label">Por que funcionou</div>
        <p>${ad.why}</p>
      </div>
      <div class="replicate-box">
        <div class="section-label">Como usar como referência</div>
        <p>${ad.replicate}</p>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openModal(ad, i));
  grid.appendChild(card);
});

function openModal(ad, i) {
  document.getElementById('modalImg').src = ad.img;
  document.getElementById('modalContent').innerHTML = `
    <div>
      <div class="tag-row" style="margin-bottom:12px">
        ${ad.tags.map((t,j) => `<span class="tag ${t}">${ad.tagLabels[j]}</span>`).join('')}
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.5px;color:var(--text);line-height:1.1;margin-bottom:4px">0${i+1} — ${ad.title}</div>
      <div style="font-size:13px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:600">${ad.angle}</div>
    </div>
    <div>
      <div class="section-label">Copy Principal</div>
      <div class="copy-block"><p>${ad.copy}</p></div>
    </div>
    <div class="why-block">
      <div class="section-label">Por que funcionou</div>
      <p>${ad.why}</p>
    </div>
    <div class="replicate-box">
      <div class="section-label">Como usar como referência</div>
      <p>${ad.replicate}</p>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBg')) {
    document.getElementById('modalBg').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalBg').classList.remove('open');
});
